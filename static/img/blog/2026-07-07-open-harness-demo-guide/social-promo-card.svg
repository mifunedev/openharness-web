    <text x="732" y="154" font-family="Consolas, Menlo, monospace" font-size="13" fill="#888888">~/openharness — zsh</text>
    <text x="662" y="194" font-family="Consolas, Menlo, monospace" font-size="17"><tspan fill="#4ade80">$ </tspan><tspan fill="#e5e5e5">curl -fsSL oh.mifune.dev/install.sh | bash</tspan></text>
<text x="662" y="222" font-family="Consolas, Menlo, monospace" font-size="17"><tspan fill="#4ade80">$ </tspan><tspan fill="#e5e5e5">make shell</tspan></text>
<text x="662" y="250" font-family="Consolas, Menlo, monospace" font-size="17"><tspan fill="#4ade80">$ </tspan><tspan fill="#e5e5e5">gh auth login &amp;&amp; gh auth setup-git</tspan></text>
<text x="662" y="278" font-family="Consolas, Menlo, monospace" font-size="17"><tspan fill="#4ade80">$ </tspan><tspan fill="#e5e5e5">claude   # or codex · pi</tspan></text>
<text x="662" y="306" font-family="Consolas, Menlo, monospace" font-size="17"><tspan fill="#888888"># safe default: Docker socket off</tspan></text>
<text x="662" y="334" font-family="Consolas, Menlo, monospace" font-size="17"><tspan fill="#888888"># isolate agent work in .oh/worktrees/</tspan></text>
