<tspan x="0" dy="74">to first PR</tspan></text>
    <text x="0" y="250" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#888888" letter-spacing="-0.2"><tspan x="0" dy="0">A repeatable setup flow for coding agents</tspan>
